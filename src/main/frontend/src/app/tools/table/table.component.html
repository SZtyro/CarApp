<table mat-table [dataSource]="dataSource">

  <ng-container *ngFor="let column of columns" [matColumnDef]="column.header">
    <th mat-header-cell *matHeaderCellDef> {{column.header | translate}} </th>
    <td mat-cell *matCellDef="let element"> {{getCellValue(column, element)}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr (click)="rowClick(row)" mat-row *matRowDef="let row; columns: displayedColumns;">
  </tr>
</table>
